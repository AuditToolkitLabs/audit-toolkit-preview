<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing - AuditToolkit Platform</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f4f4f4; color: #333; }
        .container { max-width: 1100px; margin: auto; overflow: auto; padding: 0 20px; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .pricing-tier { background: #fff; border: 1px solid #ddd; padding: 20px; text-align: center; border-radius: 5px; }
        .pricing-tier h2 { margin-top: 0; }
        .price { font-size: 2em; font-weight: bold; }
        .buy-btn { background: #3498db; color: #fff; border: 0; padding: 10px 20px; font-size: 1em; cursor: pointer; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 20px; }
        .buy-btn:hover { background: #2980b9; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2em; z-index: 1000; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AuditToolkit Platform Pricing</h1>
            <p>One platform, all the tools you need. Choose the plan that's right for you.</p>
        </header>

        <div class="pricing-grid">
            <div class="pricing-tier">
                <h2>Starter Monthly</h2>
                <p class="price">£79/mo</p>
                <button class="buy-btn" onclick="buy('price_1Tg530F107vmGJKCr4SBUcnP')">Buy Now</button>
            </div>
            <div class="pricing-tier">
                <h2>Starter Yearly</h2>
                <p class="price">£590/yr</p>
                <button class="buy-btn" onclick="buy('price_1Tg530F107vmGJKCmDIIOi7m')">Buy Now</button>
            </div>
            <div class="pricing-tier">
                <h2>Professional</h2>
                <p class="price">£1999/yr</p>
                <button class="buy-btn" onclick="buy('price_1Tg530F107vmGJKCwK4GP7LZ')">Buy Now</button>
            </div>
            <div class="pricing-tier">
                <h2>Business</h2>
                <p class="price">£4990/yr</p>
                <button class="buy-btn" onclick="buy('price_1Tg530F107vmGJKCwnbcGXCw')">Buy Now</button>
            </div>
            <div class="pricing-tier">
                <h2>Enterprise</h2>
                <p class="price">£12000/yr</p>
                <button class="buy-btn" onclick="buy('price_1Tg530F107vmGJKCcIyq3aFd')">Buy Now</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <p>Redirecting to checkout...</p>
    </div>

    <script>
        async function buy(priceId) {
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.style.display = 'flex';

            try {
                const response = await fetch('https://audittoolkit-billing-worker.billing-hooksaudittoolkitlabscom.workers.dev/api/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ priceId: priceId }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to create checkout session');
                }

                const session = await response.json();
                if (session.url) {
                    window.location.href = session.url;
                } else {
                    throw new Error('No checkout URL returned');
                }
            } catch (error) {
                console.error('Purchase error:', error);
                alert('Could not initiate purchase. Please try again.');
                loadingOverlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>

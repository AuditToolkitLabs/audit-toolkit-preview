name = "audittoolkit-billing-worker"
main = "src/index.js"
compatibility_date = "2026-05-16"
workers_dev = true

[vars]
KEYGEN_API_BASE_URL = "https://api.keygen.sh"
# Put plan mappings as compact JSON. Use cloudflare-worker/config/price-policy-map.example.json as the source template.
PRICE_POLICY_MAP_JSON = "{\"byPriceId\":{},\"byLookupKey\":{}}"

[[kv_namespaces]]
binding = "BILLING_EVENTS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# ============================================================================
#  ⚠  NOT THE DEPLOYABLE WORKER — DO NOT `wrangler deploy` FROM THIS DIRECTORY.
#
#  The live worker's canonical source is a SEPARATE repository:
#
#      audittoolkitlabs/audittoolkit-billing-worker   (Gitea)
#
#  Deploying from here would overwrite the live worker with whatever this
#  directory contains. This directory holds operational docs and the secrets-
#  sync helper only — it has NO worker source.
#
#  This file exists solely so the "Sync Cloudflare Worker Secrets" GitHub
#  Action can target the worker by name for `wrangler secret put`. Secret
#  operations need the worker name alone — verified: no `main`, no `[vars]`,
#  no bindings required. It therefore declares nothing deployable, and there
#  is intentionally no `main`, so `wrangler deploy` fails fast with
#  "Missing entry-point to Worker script".
#
#  The live PRICE_POLICY_MAP_JSON, KEYGEN_API_BASE_URL, the KV binding and all
#  13 secrets are managed on the worker in the Cloudflare dashboard and must
#  NOT be declared here. (A stale inline PRICE_POLICY_MAP_JSON previously lived
#  in this file; it was removed because the canonical map is maintained in the
#  billing-worker repo and the live dashboard variable.)
# ============================================================================

name               = "audittoolkit-billing-worker"
compatibility_date = "2026-05-16"

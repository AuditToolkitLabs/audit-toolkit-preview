name: Sync Cloudflare Worker Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-worker-secrets:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      KEYGEN_ACCOUNT_ID: ${{ secrets.KEYGEN_ACCOUNT_ID }}
      KEYGEN_API_TOKEN: ${{ secrets.KEYGEN_API_TOKEN }}
      STRIPE_API_SECRET: ${{ secrets.STRIPE_API_SECRET }}
      M365_FLOW_WEBHOOK_URL: ${{ secrets.M365_FLOW_WEBHOOK_URL }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      KEYGEN_WEBHOOK_PUBLIC_KEY: ${{ secrets.KEYGEN_WEBHOOK_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_API_TOKEN
            STRIPE_WEBHOOK_SECRET
            KEYGEN_ACCOUNT_ID
            KEYGEN_API_TOKEN
            STRIPE_API_SECRET
            M365_FLOW_WEBHOOK_URL
            ADMIN_API_TOKEN
            KEYGEN_WEBHOOK_PUBLIC_KEY
          )

          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub environment secrets:" >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Push secrets to Cloudflare Worker
        shell: bash
        run: |
          set -euo pipefail
          cd cloudflare-worker

          worker_secrets=(
            STRIPE_WEBHOOK_SECRET
            KEYGEN_ACCOUNT_ID
            KEYGEN_API_TOKEN
            STRIPE_API_SECRET
            M365_FLOW_WEBHOOK_URL
            ADMIN_API_TOKEN
            KEYGEN_WEBHOOK_PUBLIC_KEY
          )

          for key in "${worker_secrets[@]}"; do
            echo "Updating $key"
            printf '%s' "${!key}" | wrangler secret put "$key" --config wrangler.toml
          done

      - name: Verify secret names in Worker
        shell: bash
        run: |
          set -euo pipefail
          cd cloudflare-worker
          wrangler secret list --config wrangler.toml

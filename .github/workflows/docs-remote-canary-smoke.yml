name: Docs Remote Canary Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  remote-canary-smoke:
    name: Remote Canary Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable canary remote-only mode
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          cfg_path = Path("docs-source-config.json")
          cfg = json.loads(cfg_path.read_text(encoding="utf-8"))
          cfg["enableCanaryRemoteOnly"] = True
          cfg_path.write_text(json.dumps(cfg, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Run remote canary smoke test
        run: python3 ci/docs-remote-canary-smoke.py --sample-size 30

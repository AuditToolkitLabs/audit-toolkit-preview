name: Checkout Link Guard

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-checkout-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Stripe checkout links
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys
          from urllib.parse import urlparse

          root = pathlib.Path('.')
          allowed_host = 'checkout.audittoolkitlabs.com'
          test_hint_re = re.compile(r'(mode=test|livemode=false|pk_test|sk_test|test[_-]?mode|test_clock)', re.IGNORECASE)
          href_re = re.compile(r'href\s*=\s*["\']([^"\']+)["\']', re.IGNORECASE)

          def is_stripe_related(url: str) -> bool:
              lowered = url.lower()
              return (
                  'stripe.com' in lowered
                  or 'checkout.audittoolkitlabs.com' in lowered
                  or 'buy.stripe.com' in lowered
              )

          errors = []
          for html_path in root.rglob('*.html'):
              text = html_path.read_text(encoding='utf-8', errors='ignore')
              lines = text.splitlines()

              for line_no, line in enumerate(lines, start=1):
                  for match in href_re.finditer(line):
                      href = match.group(1).strip()
                      if not href:
                          continue
                      if href.startswith(('#', 'mailto:', 'tel:', 'javascript:')):
                          continue
                      if not is_stripe_related(href):
                          continue

                      parsed = urlparse(href)
                      host = (parsed.hostname or '').lower()
                      scheme = (parsed.scheme or '').lower()
                      combined = href

                      if scheme != 'https' or host != allowed_host:
                          errors.append(
                              f"{html_path}:{line_no} disallowed checkout target: {href}"
                          )
                          continue

                      if test_hint_re.search(combined):
                          errors.append(
                              f"{html_path}:{line_no} test-mode hint found in checkout link: {href}"
                          )

          if errors:
              print('Checkout link validation failed:')
              for err in errors:
                  print(f'- {err}')
              sys.exit(1)

          print('Checkout link validation passed: all Stripe-related links point to the allowed live checkout host.')
          PY

name: docs-freshness-validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  freshness-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run freshness validation
        run: python ci/validate-docs-freshness.py --show-diffs
        continue-on-error: true

      - name: Report status
        if: failure()
        run: echo "Check freshness validation logs above"

name: Sync release bundle documentation

on:
  workflow_dispatch:
    inputs:
      product:
        description: Product slug, for example audit-tool
        required: true
      version:
        description: Release version
        required: true
      bundleRoot:
        description: Existing release bundle staging directory
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: windows-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Sync docs into release bundle staging
        shell: pwsh
        run: >-
          ./scripts/sync-release-bundle-docs.ps1
          -Product '${{ inputs.product }}'
          -Version '${{ inputs.version }}'
          -BundleRoot '${{ inputs.bundleRoot }}'
          -ManifestPath './release-bundles/bundle-docs-manifest.json'
          -DocsRoot '.'

      - name: Validate release bundle documentation
        shell: pwsh
        run: >-
          ./scripts/validate-release-bundle-docs.ps1
          -Product '${{ inputs.product }}'
          -Version '${{ inputs.version }}'
          -BundleRoot '${{ inputs.bundleRoot }}'
          -ManifestPath './release-bundles/bundle-docs-manifest.json'
